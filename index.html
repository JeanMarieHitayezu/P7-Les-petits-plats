<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />	    
	    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
	    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" 
		    integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous" />
	    <title>Les Petits Plats</title>
        <link rel="stylesheet" href="assets/style.css" />
	</head>
	<body>
		<main>
			<header>
				<img class="logo" src="assets/logo.png" alt="Logo de l'entreprise" />
			</header>
            <div class="search">
	
				<form class="search-input">
	
					<input
						class="search-bar"
						placeholder="Rechercher un ingrédient, appareil, ustensiles ou une recette"
						type="search"
					/>
					<button class="search-button" type="submit">
						<i class="far fa-search"></i>
					</button>
	
				</form>
				<aside class="search-filters"></aside>
			</div>
	
			<div class="dropdown-zone">
	
				<form class="dropdown ingredients-dropdown" >
					<input
						class="ingredient-input"
						placeholder="Ingrédients"
						type="search"
					/>
					<button class="ingredient-button" type="button">
						<i class="fas fa-angle-down ingredients-arrow"></i>
					</button>
				</form>
	
				<aside class="ingredients-result">
					<ul class="ingredient-results"></ul>
				</aside>
	
				<form class="dropdown appliances-dropdown">
					<input
						class="appliance-input"
						placeholder="Appareils"
						type="search"
					/>
					<button class="appliance-button" type="button">
						<i class="fas fa-angle-down appliance-arrow"></i>
					</button>
				</form>
	
				<aside class= "appliances-result">
					<ul class="appliance-results"></ul>
				</aside>

                <form class="dropdown ustensils-dropdown">
					<input
						class="ustensils-input"
						placeholder="Ustensiles"
						type="search"
					/>
					<button class="ustensils-button" type="button">
						<i class="fas fa-angle-down ustensils-arrow"></i>
					</button>
				</form>
	
			    <aside class="ustensils-result">
					<ul class="ustensil-results"></ul>
				</aside>
	
		    </div>
	
			<div class="recipes-section"></div>
		</main>
		<script src="./scripts/index.js"></script>
		<script src="./scripts/factories/RecipeCard.js"></script>
		    
			
	</body>
	
</html>
